<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Te amo Gio ❤️</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: radial-gradient(ellipse at top, #1a0025 0%, #3b0033 40%, #6b0a3f 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'Playfair Display', serif;
      position: relative;
    }

    /* ---- Play overlay ---- */
    #playOverlay {
      position: fixed;
      inset: 0;
      background: rgba(20, 0, 35, 0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 999;
      gap: 20px;
      cursor: pointer;
      transition: opacity 0.8s ease;
    }
    #playOverlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #playOverlay .play-rose {
      font-size: 5rem;
      animation: rosePulse 2s ease-in-out infinite;
      filter: drop-shadow(0 0 30px rgba(255, 80, 120, 1));
    }
    #playOverlay h2 {
      font-family: 'Dancing Script', cursive;
      font-size: 2rem;
      color: rgba(255, 200, 220, 0.9);
      text-align: center;
    }
    #playBtn {
      background: linear-gradient(135deg, #ff4d8f, #ff1a6e);
      border: none;
      color: white;
      font-size: 1.2rem;
      font-family: 'Playfair Display', serif;
      padding: 16px 48px;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 0 30px rgba(255, 30, 100, 0.6);
      transition: transform 0.2s, box-shadow 0.2s;
      letter-spacing: 0.05em;
    }
    #playBtn:hover {
      transform: scale(1.08);
      box-shadow: 0 0 50px rgba(255, 30, 100, 0.9);
    }

    /* ---- Hidden YouTube iframe ---- */
    #ytPlayer {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
      top: -9999px;
    }

    /* ---- Floating hearts ---- */
    .hearts-container {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .heart {
      position: absolute;
      bottom: -80px;
      font-size: 1.5rem;
      animation: floatHeart linear infinite;
      opacity: 0;
    }
    @keyframes floatHeart {
      0%   { transform: translateY(0) rotate(0deg); opacity: 0; }
      10%  { opacity: 0.8; }
      90%  { opacity: 0.5; }
      100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
    }

    /* ---- Main card ---- */
    .card {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 50px 60px 40px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 150, 180, 0.2);
      border-radius: 30px;
      box-shadow:
        0 0 60px rgba(200, 0, 100, 0.3),
        0 0 120px rgba(180, 0, 80, 0.15),
        inset 0 0 60px rgba(255, 100, 150, 0.05);
      max-width: 620px;
      width: 92%;
      animation: cardAppear 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      opacity: 0;
      transform: scale(0.85) translateY(40px);
    }
    @keyframes cardAppear {
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* ---- Sparkles ---- */
    .sparkles {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      border-radius: 30px;
      overflow: hidden;
    }
    .sparkle {
      position: absolute;
      width: 4px; height: 4px;
      background: #ffd6e7;
      border-radius: 50%;
      animation: twinkle var(--dur, 2s) var(--delay, 0s) ease-in-out infinite;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0; transform: scale(0); }
      50%       { opacity: 1; transform: scale(1.5); }
    }

    /* ---- Rose ---- */
    .rose {
      font-size: 4.5rem;
      display: block;
      margin-bottom: 8px;
      animation: rosePulse 2.5s ease-in-out infinite;
      filter: drop-shadow(0 0 20px rgba(255, 80, 120, 0.8));
    }
    @keyframes rosePulse {
      0%, 100% { transform: scale(1) rotate(-5deg); }
      50%       { transform: scale(1.12) rotate(5deg); }
    }

    /* ---- Title ---- */
    .title {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(3.5rem, 10vw, 6rem);
      font-weight: 700;
      background: linear-gradient(135deg, #ff9dba 0%, #ff4d8f 40%, #ff1a6e 70%, #ffd0e4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
      margin-bottom: 12px;
      animation: shimmer 3s linear infinite;
      background-size: 200% auto;
    }
    @keyframes shimmer {
      0%   { background-position: 0% center; }
      100% { background-position: 200% center; }
    }

    /* ---- Divider ---- */
    .divider {
      width: 80px; height: 2px;
      background: linear-gradient(90deg, transparent, #ff4d8f, transparent);
      margin: 14px auto;
      border-radius: 2px;
      animation: glow 2s ease-in-out infinite alternate;
    }
    @keyframes glow {
      from { box-shadow: 0 0 5px #ff4d8f; }
      to   { box-shadow: 0 0 20px #ff1a6e, 0 0 40px #ff1a6e; }
    }

    /* ---- Lyrics display ---- */
    #lyricsBox {
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 10px 0 16px;
      position: relative;
    }
    .lyric-line {
      position: absolute;
      font-family: 'Dancing Script', cursive;
      font-size: clamp(1.1rem, 3vw, 1.45rem);
      color: rgba(255, 200, 220, 0.95);
      text-align: center;
      line-height: 1.5;
      padding: 0 10px;
      letter-spacing: 0.03em;
      opacity: 0;
      transform: translateY(14px);
      transition: opacity 0.8s ease, transform 0.8s ease;
      text-shadow: 0 0 20px rgba(255, 100, 150, 0.5);
      pointer-events: none;
    }
    .lyric-line.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .lyric-line.hide {
      opacity: 0;
      transform: translateY(-14px);
    }

    /* ---- Song credit ---- */
    .song-credit {
      font-size: 0.72rem;
      color: rgba(255, 180, 200, 0.45);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    /* ---- Beat heart ---- */
    .beat {
      font-size: 2.8rem;
      display: inline-block;
      animation: beat 1.2s ease-in-out infinite;
      filter: drop-shadow(0 0 12px rgba(255, 30, 80, 0.9));
    }
    @keyframes beat {
      0%, 100% { transform: scale(1); }
      14%       { transform: scale(1.3); }
      28%       { transform: scale(1); }
      42%       { transform: scale(1.2); }
      70%       { transform: scale(1); }
    }

    /* ---- Music note indicator ---- */
    #musicIndicator {
      position: fixed;
      bottom: 20px;
      right: 22px;
      font-size: 1.4rem;
      opacity: 0;
      transition: opacity 0.5s;
      animation: noteDance 1.8s ease-in-out infinite;
      z-index: 50;
    }
    #musicIndicator.show { opacity: 1; }
    @keyframes noteDance {
      0%, 100% { transform: translateY(0) rotate(-10deg); }
      50%       { transform: translateY(-8px) rotate(10deg); }
    }

    @media (max-width: 480px) {
      .card { padding: 36px 22px 30px; }
    }
  </style>
</head>
<body>

  <!-- Play overlay -->
  <div id="playOverlay">
    <span class="play-rose">🌹</span>
    <h2>Toca para escuchar<br>un mensaje especial...</h2>
    <button id="playBtn">▶ &nbsp;Reproducir</button>
  </div>

  <!-- Hidden YouTube audio player -->
  <div id="ytPlayer"></div>

  <!-- Floating hearts -->
  <div class="hearts-container" id="heartsContainer"></div>

  <!-- Main card -->
  <div class="card">
    <div class="sparkles" id="sparkles"></div>

    <span class="rose">🌹</span>
    <h1 class="title">Te amo Gio</h1>
    <div class="divider"></div>

    <!-- Lyrics -->
    <div id="lyricsBox"></div>

    <p class="song-credit">♪ Te Amo · Alexander Acha ♪</p>
    <span class="beat">❤️</span>
  </div>

  <!-- Music note indicator -->
  <div id="musicIndicator">🎵</div>

  <!-- YouTube IFrame API -->
  <script src="https://www.youtube.com/iframe_api"></script>

  <script>
    /* ======== LYRICS ======== */
    // A selection of lyric phrases from the song, timed in seconds
    const lyrics = [
      { t:  2,  text: "Cuando te miro a los ojos..." },
      { t:  8,  text: "Siento que el mundo se detiene" },
      { t: 15,  text: "Te amo, te amo..." },
      { t: 22,  text: "Eres el amor de mi vida" },
      { t: 30,  text: "Sin ti no existe el sol" },
      { t: 37,  text: "Cada latido es solo para ti" },
      { t: 45,  text: "Te amo..." },
      { t: 52,  text: "Eres mi razón de sonreír" },
      { t: 60,  text: "Me haces el hombre más feliz" },
      { t: 68,  text: "Te amo, Gio ❤️" },
      { t: 76,  text: "Solo tú puedes llenarme así" },
      { t: 84,  text: "Te amo con todo lo que soy" },
      { t: 92,  text: "Te amo..." },
      { t:100,  text: "Eres mi mundo entero" },
      { t:108,  text: "Te amo, te amo, te amo..." },
      { t:116,  text: "Para siempre seré tuyo" },
      { t:124,  text: "Te amo, Gio ❤️" },
      { t:132,  text: "Cada día más..." },
      { t:140,  text: "Te amo..." },
      { t:150,  text: "Eres lo más hermoso de mi vida" },
      { t:158,  text: "Te amo, te amo..." },
      { t:166,  text: "Nunca dejaré de amarte" },
      { t:174,  text: "Te amo, Gio 🌹" },
    ];

    /* ======== YOUTUBE PLAYER ======== */
    let player;
    let started = false;
    let lyricsStartTime = null;
    let currentLyricIdx = -1;

    function onYouTubeIframeAPIReady() {
      player = new YT.Player('ytPlayer', {
        videoId: 'kpm6J8gyIrM',
        playerVars: {
          autoplay: 0,
          controls: 0,
          disablekb: 1,
          fs: 0,
          iv_load_policy: 3,
          modestbranding: 1,
          rel: 0
        },
        events: {
          onReady: function() {},
          onStateChange: function(e) {
            if (e.data === YT.PlayerState.PLAYING && !started) {
              started = true;
              lyricsStartTime = Date.now();
              startLyrics();
              document.getElementById('musicIndicator').classList.add('show');
            }
          }
        }
      });
    }

    /* ======== PLAY BUTTON ======== */
    document.getElementById('playBtn').addEventListener('click', function() {
      const overlay = document.getElementById('playOverlay');
      overlay.classList.add('hidden');
      setTimeout(() => overlay.style.display = 'none', 900);

      // Start music
      if (player && player.playVideo) {
        player.playVideo();
      }
      // Spawn hearts immediately
      for (let i = 0; i < 20; i++) setTimeout(createHeart, i * 200);
    });

    /* ======== LYRICS ENGINE ======== */
    let activeEl = null;

    function buildLyricsEl(text) {
      const el = document.createElement('span');
      el.className = 'lyric-line';
      el.textContent = text;
      document.getElementById('lyricsBox').appendChild(el);
      return el;
    }

    function showLyric(idx) {
      if (idx >= lyrics.length) return;
      const line = lyrics[idx];

      // Hide previous
      if (activeEl) {
        const prev = activeEl;
        prev.classList.remove('visible');
        prev.classList.add('hide');
        setTimeout(() => prev.remove(), 900);
      }

      // Show new
      const el = buildLyricsEl(line.text);
      requestAnimationFrame(() => {
        requestAnimationFrame(() => el.classList.add('visible'));
      });
      activeEl = el;
    }

    function startLyrics() {
      let idx = 0;

      function tick() {
        if (!lyricsStartTime) return;
        const elapsed = (Date.now() - lyricsStartTime) / 1000;

        while (idx < lyrics.length && elapsed >= lyrics[idx].t) {
          showLyric(idx);
          idx++;
        }

        if (idx < lyrics.length) {
          requestAnimationFrame(tick);
        }
      }
      requestAnimationFrame(tick);
    }

    /* ======== FLOATING HEARTS ======== */
    const heartsContainer = document.getElementById('heartsContainer');
    const heartEmojis = ['❤️','💕','💖','💗','💓','🌹','✨'];

    function createHeart() {
      const h = document.createElement('div');
      h.classList.add('heart');
      h.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
      h.style.left = Math.random() * 100 + 'vw';
      h.style.fontSize = (Math.random() * 1.5 + 0.8) + 'rem';
      const dur = Math.random() * 8 + 6;
      h.style.animationDuration = dur + 's';
      h.style.animationDelay = Math.random() * 3 + 's';
      heartsContainer.appendChild(h);
      setTimeout(() => h.remove(), (dur + 4) * 1000);
    }

    // Idle hearts before play
    for (let i = 0; i < 6; i++) setTimeout(createHeart, i * 800);
    setInterval(createHeart, 1200);

    /* ======== SPARKLES ======== */
    const sparklesEl = document.getElementById('sparkles');
    for (let i = 0; i < 20; i++) {
      const s = document.createElement('div');
      s.classList.add('sparkle');
      s.style.left = Math.random() * 100 + '%';
      s.style.top  = Math.random() * 100 + '%';
      s.style.setProperty('--dur',   (Math.random() * 2 + 1.5) + 's');
      s.style.setProperty('--delay', (Math.random() * 3) + 's');
      sparklesEl.appendChild(s);
    }

    /* ======== CLICK BURST ======== */
    document.body.addEventListener('click', (e) => {
      if (document.getElementById('playOverlay').style.display !== 'none' &&
          !document.getElementById('playOverlay').classList.contains('hidden')) return;
      for (let i = 0; i < 8; i++) {
        const burst = document.createElement('div');
        burst.style.cssText = `position:fixed;left:${e.clientX}px;top:${e.clientY}px;font-size:${Math.random()*1.5+1}rem;pointer-events:none;z-index:200;`;
        burst.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
        document.body.appendChild(burst);
        const angle = (Math.PI * 2 * i) / 8;
        const dist  = Math.random() * 80 + 40;
        burst.animate([
          { transform: 'translate(-50%,-50%) scale(0)', opacity: 1 },
          { transform: `translate(calc(-50% + ${Math.cos(angle)*dist}px),calc(-50% + ${Math.sin(angle)*dist}px)) scale(1.2)`, opacity: 0 }
        ], { duration: 900, easing: 'ease-out', fill: 'forwards' });
        setTimeout(() => burst.remove(), 1000);
      }
    });
  </script>
</body>
</html>
