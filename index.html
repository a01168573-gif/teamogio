<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Te amo Gio</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      min-height: 100vh;
      background: radial-gradient(ellipse at top, #1a0025 0%, #3b0033 45%, #6b0a3f 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'Playfair Display', serif;
    }

    /* === FLOATING HEARTS === */
    .hearts-layer { position:fixed; inset:0; pointer-events:none; z-index:0; }
    .heart {
      position:absolute; bottom:-80px;
      animation: floatUp linear infinite; opacity:0;
    }
    @keyframes floatUp {
      0%   { transform:translateY(0) rotate(0deg); opacity:0; }
      10%  { opacity:.9; }
      90%  { opacity:.5; }
      100% { transform:translateY(-115vh) rotate(360deg); opacity:0; }
    }

    /* === CARD === */
    .card {
      position:relative; z-index:10; text-align:center;
      padding:44px 56px 38px;
      background:rgba(255,255,255,.05);
      backdrop-filter:blur(22px); -webkit-backdrop-filter:blur(22px);
      border:1px solid rgba(255,150,180,.22); border-radius:32px;
      box-shadow: 0 0 70px rgba(200,0,100,.3), 0 0 130px rgba(180,0,80,.14), inset 0 0 60px rgba(255,100,150,.06);
      max-width:640px; width:93%;
      animation: cardIn 1.2s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes cardIn {
      from{ opacity:0; transform:scale(.85) translateY(40px); }
      to  { opacity:1; transform:scale(1) translateY(0); }
    }

    /* sparkles */
    .sparkles{ position:absolute; inset:0; pointer-events:none; border-radius:32px; overflow:hidden; }
    .sparkle{
      position:absolute; width:4px; height:4px; background:#ffd6e7; border-radius:50%;
      animation:twinkle var(--d,2s) var(--dl,0s) ease-in-out infinite;
    }
    @keyframes twinkle{
      0%,100%{ opacity:0; transform:scale(0); }
      50%    { opacity:1; transform:scale(1.6); }
    }

    /* rose */
    .rose{
      font-size:4.4rem; display:block; margin-bottom:5px;
      animation:rosePulse 2.5s ease-in-out infinite;
      filter:drop-shadow(0 0 22px rgba(255,80,120,.85));
    }
    @keyframes rosePulse{
      0%,100%{ transform:scale(1) rotate(-5deg); }
      50%    { transform:scale(1.14) rotate(5deg); }
    }

    /* title */
    .title{
      font-family:'Dancing Script',cursive; font-size:clamp(3rem,9vw,5.5rem); font-weight:700;
      background:linear-gradient(135deg,#ff9dba 0%,#ff4d8f 40%,#ff1a6e 70%,#ffd0e4 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      background-size:200% auto; line-height:1.1; margin-bottom:8px;
      animation:shimmer 3s linear infinite;
    }
    @keyframes shimmer{
      from{ background-position:0% center; }
      to  { background-position:200% center; }
    }

    /* divider */
    .divider{
      width:80px; height:2px; margin:10px auto;
      background:linear-gradient(90deg,transparent,#ff4d8f,transparent);
      border-radius:2px; animation:glow 2s ease-in-out infinite alternate;
    }
    @keyframes glow{
      from{ box-shadow:0 0 5px #ff4d8f; }
      to  { box-shadow:0 0 22px #ff1a6e, 0 0 44px #ff1a6e; }
    }

    /* beat heart */
    .beat{
      font-size:2.4rem; display:inline-block;
      animation:beat 1.2s ease-in-out infinite;
      filter:drop-shadow(0 0 12px rgba(255,30,80,.9));
    }
    @keyframes beat{
      0%,100%{ transform:scale(1); }
      14%    { transform:scale(1.32); }
      28%    { transform:scale(1); }
      42%    { transform:scale(1.2); }
    }

    /* === SORPRESA BUTTON === */
    .btn-sorpresa{
      display:inline-flex; align-items:center; gap:10px;
      margin:16px 0 6px; padding:14px 40px;
      background:linear-gradient(135deg,#ff4d8f,#c2185b);
      border:none; border-radius:50px; cursor:pointer;
      font-family:'Dancing Script',cursive; font-size:1.6rem; font-weight:700; color:#fff;
      letter-spacing:.04em;
      box-shadow:0 0 28px rgba(255,30,100,.55), 0 4px 20px rgba(0,0,0,.3);
      transition:transform .2s, box-shadow .2s;
      animation:btnPulse 2.2s ease-in-out infinite;
    }
    .btn-sorpresa:hover{ transform:scale(1.08); box-shadow:0 0 50px rgba(255,30,100,.9), 0 4px 25px rgba(0,0,0,.35); }
    @keyframes btnPulse{
      0%,100%{ box-shadow:0 0 28px rgba(255,30,100,.55), 0 4px 20px rgba(0,0,0,.3); }
      50%    { box-shadow:0 0 50px rgba(255,30,100,.85), 0 4px 25px rgba(0,0,0,.35); }
    }

    /* === LYRICS === */
    #lyricWrap{
      min-height:80px;
      display:flex; align-items:center; justify-content:center;
      margin:12px 0 4px; position:relative;
    }
    .lyric{
      position:absolute; width:100%;
      font-family:'Dancing Script',cursive;
      font-size:clamp(1.1rem,3.4vw,1.5rem);
      color:rgba(255,215,230,.97);
      text-align:center; line-height:1.5; letter-spacing:.03em;
      text-shadow:0 0 18px rgba(255,100,150,.55);
      opacity:0; transform:translateY(14px);
      transition:opacity .55s ease, transform .55s ease;
      padding:0 6px;
    }
    .lyric.show{ opacity:1; transform:translateY(0); }
    .lyric.out { opacity:0; transform:translateY(-14px); }

    /* equalizer bars */
    #eqBar{
      display:none; align-items:center; justify-content:center;
      gap:4px; margin-top:8px;
    }
    #eqBar.on{ display:flex; }
    .bar{
      width:4px; background:#ff4d8f; border-radius:4px;
      animation:barA var(--s,.6s) ease-in-out infinite alternate;
    }
    @keyframes barA{
      from{ height:5px; opacity:.4; }
      to  { height:22px; opacity:1; }
    }

    /* note corner */
    #musicNote{
      position:fixed; bottom:18px; right:20px; font-size:1.5rem;
      opacity:0; transition:opacity .5s; z-index:50;
      animation:noteDance 1.8s ease-in-out infinite;
    }
    #musicNote.on{ opacity:1; }
    @keyframes noteDance{
      0%,100%{ transform:translateY(0) rotate(-10deg); }
      50%    { transform:translateY(-8px) rotate(10deg); }
    }

    #yt{ position:absolute; width:1px; height:1px; opacity:0; top:-9999px; }

    @media(max-width:480px){
      .card{ padding:32px 16px 26px; }
      .btn-sorpresa{ font-size:1.3rem; padding:12px 26px; }
    }
  </style>
</head>
<body>

<div class="hearts-layer" id="heartsLayer"></div>

<div class="card">
  <div class="sparkles" id="sparkles"></div>

  <span class="rose">&#127801;</span>
  <h1 class="title">Te amo Gio</h1>
  <div class="divider"></div>

  <button class="btn-sorpresa" id="btnSorpresa" onclick="startSorpresa()">
    &#127873;&nbsp; Sorpresa
  </button>

  <div id="lyricWrap"></div>

  <div id="eqBar">
    <div class="bar" style="--s:.50s"></div>
    <div class="bar" style="--s:.70s"></div>
    <div class="bar" style="--s:.40s"></div>
    <div class="bar" style="--s:.80s"></div>
    <div class="bar" style="--s:.60s"></div>
    <div class="bar" style="--s:.45s"></div>
    <div class="bar" style="--s:.75s"></div>
  </div>

  <br>
  <span class="beat">&#10084;&#65039;</span>
</div>

<div id="musicNote">&#127925;</div>
<div id="yt"></div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>

  { at:178.0, text: "M\u00e1s que a mi m\u00fasica, m\u00e1s que a mis a\u00f1os" },
  { at:184.0, text: "M\u00e1s que a mis tristezas, m\u00e1s que a mis quehaceres" },

/* ================================================
   YOUTUBE PLAYER
   ================================================ */
var player, trackTimer;
var lastIdx = -1;

function onYouTubeIframeAPIReady() {
  player = new YT.Player('yt', {
    videoId: 'kpm6J8gyIrM',
    playerVars: { autoplay:0, controls:0, rel:0, iv_load_policy:3, modestbranding:1, disablekb:1 },
    events: {
      onStateChange: function(e) {
        if (e.data === YT.PlayerState.PLAYING) {
          document.getElementById('musicNote').classList.add('on');
          document.getElementById('eqBar').classList.add('on');
          startTracking();
        } else {
          clearInterval(trackTimer);
        }
      }
    }
  });
}

function startTracking() {
  clearInterval(trackTimer);
  lastIdx = -1;
  trackTimer = setInterval(function() {
    if (!player || typeof player.getCurrentTime !== 'function') return;
    var t = player.getCurrentTime();
    var found = -1;
    for (var i = lyrics.length - 1; i >= 0; i--) {
      if (t >= lyrics[i].at) { found = i; break; }
    }
    if (found !== -1 && found !== lastIdx) {
      showLyric(found);
      lastIdx = found;
    }
  }, 200);
}

/* ================================================
   LYRIC DISPLAY
   ================================================ */
var curEl = null;

function showLyric(idx) {
  var wrap = document.getElementById('lyricWrap');
  if (curEl) {
    var old = curEl;
    old.classList.remove('show');
    old.classList.add('out');
    setTimeout(function(){ if (old.parentNode) old.parentNode.removeChild(old); }, 650);
  }
  var el = document.createElement('span');
  el.className = 'lyric';
  el.textContent = lyrics[idx].text;
  wrap.appendChild(el);
  requestAnimationFrame(function(){
    requestAnimationFrame(function(){ el.classList.add('show'); });
  });
  curEl = el;
}

/* ================================================
   SORPRESA BUTTON
   ================================================ */
var started = false;
function startSorpresa() {
  if (started) return;
  started = true;
  var btn = document.getElementById('btnSorpresa');
  btn.style.transition = 'opacity .5s, transform .5s';
  btn.style.opacity = '0'; btn.style.transform = 'scale(.8)';
  setTimeout(function(){ btn.style.display = 'none'; }, 520);
  if (player && player.playVideo) player.playVideo();
  for (var i = 0; i < 30; i++) {
    (function(i){ setTimeout(createHeart, i * 120); })(i);
  }
}

/* ================================================
   FLOATING HEARTS
   ================================================ */
var emojis = ['\u2764\uFE0F','\uD83D\uDC95','\uD83D\uDC96','\uD83D\uDC97','\uD83D\uDC93','\uD83C\uDF39','\u2728'];
var layer  = document.getElementById('heartsLayer');

function createHeart() {
  var h = document.createElement('div');
  h.className = 'heart';
  h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
  h.style.left = Math.random()*100 + 'vw';
  h.style.fontSize = (Math.random()*1.4 + 0.8) + 'rem';
  var dur = Math.random()*8 + 6;
  h.style.animationDuration = dur + 's';
  h.style.animationDelay   = (Math.random()*4) + 's';
  layer.appendChild(h);
  setTimeout(function(){ if(h.parentNode) h.parentNode.removeChild(h); }, (dur+5)*1000);
}

for (var i=0;i<8;i++){ (function(i){ setTimeout(createHeart,i*700); })(i); }
setInterval(createHeart, 1400);

/* sparkles */
var sp = document.getElementById('sparkles');
for (var i=0;i<22;i++){
  var s=document.createElement('div'); s.className='sparkle';
  s.style.left=Math.random()*100+'%'; s.style.top=Math.random()*100+'%';
  s.style.setProperty('--d',(Math.random()*2+1.5)+'s');
  s.style.setProperty('--dl',(Math.random()*3)+'s');
  sp.appendChild(s);
}

/* click burst */
document.body.addEventListener('click', function(e) {
  if (!started) return;
  for (var i=0;i<8;i++){
    var b=document.createElement('div');
    b.style.cssText='position:fixed;left:'+e.clientX+'px;top:'+e.clientY+'px;font-size:'+(Math.random()*1.4+1)+'rem;pointer-events:none;z-index:200;';
    b.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    document.body.appendChild(b);
    var angle=(Math.PI*2*i)/8, dist=Math.random()*80+40;
    b.animate([
      {transform:'translate(-50%,-50%) scale(0)',opacity:1},
      {transform:'translate(calc(-50% + '+Math.cos(angle)*dist+'px),calc(-50% + '+Math.sin(angle)*dist+'px)) scale(1.2)',opacity:0}
    ],{duration:900,easing:'ease-out',fill:'forwards'});
    setTimeout(function(){if(b.parentNode)b.parentNode.removeChild(b);},1000);
  }
});

</html>
